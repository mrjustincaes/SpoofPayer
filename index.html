<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpoofPayer - Free Document Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { 
            background-color: #ffffff; 
            color: #000000; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            display: flex; 
            width: 100%; 
            max-width: 1300px; 
            gap: 30px; 
        }
        @media (max-width: 1000px) {
            .container { flex-direction: column; }
        }

        /* Form Styles */
        .form-section { 
            flex: 1; 
            min-width: 400px;
            padding: 20px; 
            border: 1px solid #000000; 
            background-color: #ffffff;
            height: fit-content;
        }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 12px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #000; font-size: 14px; }
        .row-inputs { display: flex; gap: 10px; }
        .row-inputs .form-group { flex: 1; }
        .btn { padding: 12px; background-color: #000000; color: #ffffff; border: none; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; font-weight: bold; text-transform: uppercase; }
        .btn:hover { background-color: #333333; }

        /* Preview Styles */
        .preview-section { 
            flex: 2; 
            padding: 20px; 
            border: 1px solid #000000; 
            background-color: #ffffff; 
            overflow-y: auto;
            max-height: 90vh;
        }
        .document-container {
            background-color: #ffffff;
            width: 100%;
        }

        /* W-2 Specific Styles */
        .w2-box {
            border: 2px solid #000;
            padding: 0;
            font-size: 12px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .w2-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid #000;
        }
        .w2-cell {
            border-right: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 5px;
            min-height: 40px;
        }
        .w2-cell:last-child { border-right: none; }
        .w2-label { font-size: 10px; font-weight: bold; margin-bottom: 4px; display: block; }
        .w2-value { font-family: monospace; font-size: 14px; }
        
        /* Paystub Specific Styles */
        .paystub-wrapper {
            border: 1px dashed #999;
            margin-bottom: 30px;
            padding: 20px;
            page-break-after: always;
        }
        .paystub-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }
        .ps-block { font-size: 14px; line-height: 1.4; flex: 1; }
        .ps-title { text-align: right; flex: 1; }
        .ps-title h3 { margin: 0; font-size: 18px; text-transform: uppercase; }
        
        .ps-tables { margin-bottom: 20px; }
        .ps-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 13px; }
        .ps-table th, .ps-table td { padding: 5px; text-align: left; }
        .ps-table th { border-bottom: 1px solid #000; font-weight: bold; }
        .ps-table td.money { text-align: right; font-family: monospace; }
        .ps-table th.money { text-align: right; }
        .summary-text { font-size: 13px; font-weight: bold; margin-bottom: 30px; border-top: 1px solid #000; padding-top: 5px;}
        
        /* Direct Deposit Styles */
        .dd-area {
            border: 2px solid #000;
            padding: 15px;
            position: relative;
        }
        .dd-header {
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            letter-spacing: 1px;
        }
        .dd-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .dd-table th {
            text-align: left;
            border-bottom: 1px solid #999;
            padding: 8px 5px;
        }
        .dd-table td {
            padding: 10px 5px;
            font-family: monospace;
            font-size: 15px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Input Form Section -->
        <div class="form-section">
            <h2 style="margin-top: 0;">SpoofPayer Setup</h2>
            
            <div class="form-group">
                <label>Document Type</label>
                <select id="docType" onchange="toggleFormFields(); updatePreview();">
                    <option value="paystub">Paystubs (Up to 12)</option>
                    <option value="w2">W-2 Form</option>
                </select>
            </div>

            <div id="paystubConfig" class="row-inputs">
                <div class="form-group">
                    <label>Number of Stubs</label>
                    <select id="stubCount" onchange="updatePreview()">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>First Period End</label>
                    <input type="date" id="startDate" onchange="updatePreview()">
                </div>
            </div>

            <hr style="margin: 15px 0;">

            <h3 style="font-size: 14px; margin-bottom: 10px;">Company Details</h3>
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" id="compName" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Address 1</label>
                <input type="text" id="compAdd1" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Address 2 (Optional)</label>
                <input type="text" id="compAdd2" oninput="updatePreview()">
            </div>
            <div class="row-inputs">
                <div class="form-group" style="flex: 2;">
                    <label>City</label>
                    <input type="text" id="compCity" oninput="updatePreview()">
                </div>
                <div class="form-group" style="flex: 1.5;">
                    <label>State</label>
                    <select id="compState" onchange="updatePreview()">
                        <option value="">Select</option>
                        <!-- Auto-populated via JS -->
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Zipcode</label>
                    <input type="text" id="compZip" oninput="updatePreview()">
                </div>
            </div>
            <div class="row-inputs">
                <div class="form-group">
                    <label>Phone / Email</label>
                    <input type="text" id="compContact" oninput="updatePreview()">
                </div>
                <div class="form-group" id="einGroup">
                    <label>Company EIN (W2)</label>
                    <input type="text" id="compEIN" oninput="updatePreview()">
                </div>
            </div>

            <hr style="margin: 15px 0;">

            <h3 style="font-size: 14px; margin-bottom: 10px;">Employee Details</h3>
            <div class="form-group">
                <label>Employee Name</label>
                <input type="text" id="empName" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Address 1</label>
                <input type="text" id="empAdd1" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Address 2 (Optional)</label>
                <input type="text" id="empAdd2" oninput="updatePreview()">
            </div>
            <div class="row-inputs">
                <div class="form-group" style="flex: 2;">
                    <label>City</label>
                    <input type="text" id="empCity" oninput="updatePreview()">
                </div>
                <div class="form-group" style="flex: 1.5;">
                    <label>State</label>
                    <select id="empState" onchange="updatePreview()">
                        <option value="">Select</option>
                        <!-- Auto-populated via JS -->
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Zipcode</label>
                    <input type="text" id="empZip" oninput="updatePreview()">
                </div>
            </div>
            <div class="form-group">
                <label>Employee SSN (Format: XXX-XX-XXXX)</label>
                <input type="text" id="empSSN" oninput="updatePreview()">
            </div>

            <hr style="margin: 15px 0;">

            <div id="ddConfig">
                <h3 style="font-size: 14px; margin-bottom: 10px;">Direct Deposit Details</h3>
                <div class="row-inputs">
                    <div class="form-group">
                        <label>Bank Name</label>
                        <input type="text" id="bankName" oninput="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label>Account Number (Last 4)</label>
                        <input type="text" id="acctNum" maxlength="4" oninput="updatePreview()">
                    </div>
                </div>
                <hr style="margin: 15px 0;">
            </div>

            <h3 style="font-size: 14px; margin-bottom: 10px;">Financials</h3>
            <div class="form-group">
                <label>Target Amount ($)</label>
                <input type="number" id="targetAmount" step="0.01" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>This Amount Is:</label>
                <select id="incomeType" onchange="updatePreview()">
                    <option value="after">After Taxes (Net Take-Home)</option>
                    <option value="before">Before Taxes (Gross Pay)</option>
                </select>
            </div>

            <button class="btn" onclick="downloadPDF()">Generate & Download PDF</button>
        </div>

        <!-- Document Preview Section -->
        <div class="preview-section">
            <div id="documentOutput" class="document-container">
                <!-- Rendered dynamically via JS -->
            </div>
        </div>
    </div>

    <script>
        // State Income Tax Dictionary (2025/2026 Engine)
        // 0 = No Income Tax states. Decimals = Flat rates or simplified graduated averages.
        const STATE_TAX_RATES = {
            "AL": 0.04, "AK": 0.00, "AZ": 0.025, "AR": 0.039, "CA": 0.06, 
            "CO": 0.044, "CT": 0.05, "DE": 0.04, "FL": 0.00, "GA": 0.0519, 
            "HI": 0.07, "ID": 0.053, "IL": 0.0495, "IN": 0.03, "IA": 0.038, 
            "KS": 0.052, "KY": 0.04, "LA": 0.03, "ME": 0.058, "MD": 0.045, 
            "MA": 0.05, "MI": 0.0425, "MN": 0.06, "MS": 0.04, "MO": 0.04, 
            "MT": 0.047, "NE": 0.045, "NV": 0.00, "NH": 0.00, "NJ": 0.05, 
            "NM": 0.04, "NY": 0.05, "NC": 0.0399, "ND": 0.02, "OH": 0.0275, 
            "OK": 0.045, "OR": 0.07, "PA": 0.0307, "RI": 0.04, "SC": 0.04, 
            "SD": 0.00, "TN": 0.00, "TX": 0.00, "UT": 0.0455, "VT": 0.04, 
            "VA": 0.04, "WA": 0.00, "WV": 0.04, "WI": 0.05, "WY": 0.00
        };

        const FED_TAX_RATE = 0.134; 
        const W2_FED_RATE = 0.1504; 
        const SS_RATE = 0.062; 
        const MED_RATE = 0.0145; 

        // Populate State Dropdowns
        function populateStates() {
            const selects = [document.getElementById('compState'), document.getElementById('empState')];
            for (const state in STATE_TAX_RATES) {
                selects.forEach(select => {
                    let option = document.createElement("option");
                    option.text = state;
                    option.value = state;
                    select.add(option);
                });
            }
        }

        function toggleFormFields() {
            const docType = document.getElementById('docType').value;
            const paystubConfig = document.getElementById('paystubConfig');
            const ddConfig = document.getElementById('ddConfig');
            
            if (docType === 'w2') {
                paystubConfig.classList.add('hidden');
                ddConfig.classList.add('hidden');
            } else {
                paystubConfig.classList.remove('hidden');
                ddConfig.classList.remove('hidden');
            }
        }

        function fmt(num) {
            return parseFloat(num).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }

        function buildAddressBlock(add1, add2, city, state, zip) {
            let block = add1 ? `${add1}<br>` : '[STREET ADDRESS]<br>';
            if (add2) block += `${add2}<br>`;
            
            let bottomLine = '';
            if (city || state || zip) {
                bottomLine = `${city || '[CITY]'}, ${state || '[ST]'} ${zip || '[ZIP]'}`;
            } else {
                bottomLine = '[CITY, STATE ZIP]';
            }
            return block + bottomLine;
        }

        function calculateTaxes(targetAmt, type, isW2, compStateCode) {
            let gross, fed, ss, med, stateTax, net;
            let fedRate = isW2 ? W2_FED_RATE : FED_TAX_RATE;
            
            // Dynamic State Tax Engine based on Company Location
            let stateRate = STATE_TAX_RATES[compStateCode] || 0;

            if (type === 'before') {
                gross = parseFloat(targetAmt) || 0;
                fed = gross * fedRate;
                ss = gross * SS_RATE;
                med = gross * MED_RATE;
                stateTax = gross * stateRate;
                net = gross - fed - ss - med - stateTax;
            } else {
                net = parseFloat(targetAmt) || 0;
                const combinedRate = 1 - fedRate - SS_RATE - MED_RATE - stateRate;
                gross = net / combinedRate;
                fed = gross * fedRate;
                ss = gross * SS_RATE;
                med = gross * MED_RATE;
                stateTax = gross * stateRate;
            }
            return { gross, fed, ss, med, stateTax, net };
        }

        function renderW2(data, taxes) {
            return `
            <div class="w2-box">
                <div class="w2-grid">
                    <div class="w2-cell"><span class="w2-label">a Employee's social security number</span><span class="w2-value">${data.empSSN}</span></div>
                    <div class="w2-cell" style="border-right:none; background:#eee;">OMB No. 1545-0029 For Official Use Only</div>
                </div>
                <div class="w2-grid">
                    <div class="w2-cell"><span class="w2-label">b Employer identification number (EIN)</span><span class="w2-value">${data.compEIN}</span></div>
                    <div class="w2-cell"><span class="w2-label">1 Wages, tips, other compensation</span><span class="w2-value">${taxes.gross.toFixed(2)}</span></div>
                    <div class="w2-cell"><span class="w2-label">2 Federal income tax withheld</span><span class="w2-value">${taxes.fed.toFixed(2)}</span></div>
                </div>
                <div class="w2-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                    <div class="w2-cell" style="grid-row: span 2;">
                        <span class="w2-label">c Employer's name, address, and ZIP code</span><br>
                        <span class="w2-value">
                            ${data.compName}<br>
                            ${data.compAddressBlock}
                        </span>
                    </div>
                    <div class="w2-cell"><span class="w2-label">3 Social security wages</span><span class="w2-value">${taxes.gross.toFixed(2)}</span></div>
                    <div class="w2-cell"><span class="w2-label">4 Social security tax withheld</span><span class="w2-value">${taxes.ss.toFixed(2)}</span></div>
                    <div class="w2-cell"><span class="w2-label">5 Medicare wages and tips</span><span class="w2-value">${taxes.gross.toFixed(2)}</span></div>
                    <div class="w2-cell"><span class="w2-label">6 Medicare tax withheld</span><span class="w2-value">${taxes.med.toFixed(2)}</span></div>
                </div>
                <div class="w2-grid">
                    <div class="w2-cell" style="min-height:60px;"><span class="w2-label">e Employee's first name, initial, last name</span><br><span class="w2-value">${data.empName}</span></div>
                    <div class="w2-cell" style="min-height:60px;">
                        <span class="w2-label">f Employee's address and ZIP code</span><br>
                        <span class="w2-value">${data.empAddressBlock}</span>
                    </div>
                </div>
                <div class="w2-grid" style="grid-template-columns: 1fr 2fr 1fr 2fr 1fr;">
                    <div class="w2-cell"><span class="w2-label">15 State</span><span class="w2-value">${data.compState || ''}</span></div>
                    <div class="w2-cell"><span class="w2-label">16 State wages, tips, etc.</span><span class="w2-value">${taxes.gross.toFixed(2)}</span></div>
                    <div class="w2-cell"><span class="w2-label">17 State income tax</span><span class="w2-value">${taxes.stateTax.toFixed(2)}</span></div>
                    <div class="w2-cell"><span class="w2-label">18 Local wages, tips, etc.</span><span class="w2-value"></span></div>
                    <div class="w2-cell"><span class="w2-label">19 Local tax</span><span class="w2-value"></span></div>
                </div>
                <div style="padding: 10px; font-weight:bold; font-size: 16px; border-top: 1px solid #000;">
                    W-2 Wage and Tax Statement 2025
                </div>
            </div>`;
        }

        function renderPaystub(data, taxes, stubIndex, totalStubs) {
            let baseDate = document.getElementById('startDate').value ? new Date(document.getElementById('startDate').value) : new Date();
            let offsetDays = (totalStubs - stubIndex) * 14; 
            let pEnd = new Date(baseDate);
            pEnd.setDate(pEnd.getDate() - offsetDays);
            let pDate = new Date(pEnd);
            pDate.setDate(pDate.getDate() + 4); 

            let dateFmt = (d) => `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}/${d.getFullYear()}`;
            
            let periodMultiplier = 8 + stubIndex; 
            
            let ytdGross = taxes.gross * periodMultiplier;
            let ytdFed = taxes.fed * periodMultiplier;
            let ytdSS = taxes.ss * periodMultiplier;
            let ytdMed = taxes.med * periodMultiplier;
            let ytdState = taxes.stateTax * periodMultiplier;
            let ytdNet = taxes.net * periodMultiplier;
            let deductions = taxes.fed + taxes.ss + taxes.med + taxes.stateTax;

            let checkNum = 3500 + stubIndex;

            return `
            <div class="paystub-wrapper">
                <div class="paystub-header">
                    <div class="ps-block">
                        <strong>${data.compName}</strong><br>
                        ${data.compAddressBlock}<br>
                        ${data.compContact}
                    </div>
                    <div class="ps-block">
                        <strong>${data.empName}</strong><br>
                        ${data.empAddressBlock}<br><br>
                        SSN: ${data.empSSN}
                    </div>
                    <div class="ps-title">
                        <h3>Earnings Statement</h3>
                        <p>Period Ending: ${dateFmt(pEnd)}<br>Pay Date: ${dateFmt(pDate)}</p>
                    </div>
                </div>

                <div class="ps-tables">
                    <table class="ps-table">
                        <thead>
                            <tr><th>Earnings</th><th class="money">Rate</th><th class="money">This Period</th><th class="money">Year to Date</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>Salary</td><td class="money">${fmt(taxes.gross * 26)}</td><td class="money">${fmt(taxes.gross)}</td><td class="money">${fmt(ytdGross)}</td></tr>
                            <tr style="border-top: 2px solid #000; font-weight: bold;"><td>Gross Pay</td><td></td><td class="money">$${fmt(taxes.gross)}</td><td class="money">$${fmt(ytdGross)}</td></tr>
                        </tbody>
                    </table>

                    <table class="ps-table">
                        <thead>
                            <tr><th>Deductions</th><th>Type</th><th class="money">This Period</th><th class="money">Year to Date</th></tr>
                        </thead>
                        <tbody>
                            <tr><td></td><td>FICA-Medicare</td><td class="money">${fmt(taxes.med)}</td><td class="money">${fmt(ytdMed)}</td></tr>
                            <tr><td></td><td>FICA-Social Security</td><td class="money">${fmt(taxes.ss)}</td><td class="money">${fmt(ytdSS)}</td></tr>
                            <tr><td></td><td>Federal Tax</td><td class="money">${fmt(taxes.fed)}</td><td class="money">${fmt(ytdFed)}</td></tr>
                            <tr><td></td><td>State Tax (${data.compState || 'N/A'})</td><td class="money">${fmt(taxes.stateTax)}</td><td class="money">${fmt(ytdState)}</td></tr>
                            <tr style="border-top: 2px solid #000; font-weight: bold;"><td>Net Pay</td><td></td><td class="money">$${fmt(taxes.net)}</td><td class="money">$${fmt(ytdNet)}</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="summary-text">
                    Your deductions for this period are ${fmt(deductions)}
                </div>

                <!-- Direct Deposit Advice Slip -->
                <div class="dd-area">
                    <div class="dd-header">NON-NEGOTIABLE - DIRECT DEPOSIT ADVICE</div>
                    
                    <div style="display:flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px;">
                        <div>
                            <strong>Deposited For:</strong><br>
                            ${data.empName}
                        </div>
                        <div style="text-align: right;">
                            <strong>Advice Number:</strong> ${checkNum}<br>
                            <strong>Deposit Date:</strong> ${dateFmt(pDate)}
                        </div>
                    </div>

                    <table class="dd-table">
                        <thead>
                            <tr>
                                <th>Bank Name</th>
                                <th>Account Number</th>
                                <th>Routing Number</th>
                                <th style="text-align: right;">Deposit Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>${data.bankName}</td>
                                <td>********${data.acctNum}</td>
                                <td>*********</td>
                                <td style="text-align: right; font-weight: bold;">$${fmt(taxes.net)}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            `;
        }

        function updatePreview() {
            const docType = document.getElementById('docType').value;
            const targetAmt = document.getElementById('targetAmount').value;
            const incType = document.getElementById('incomeType').value;
            const output = document.getElementById('documentOutput');
            
            const data = {
                compName: document.getElementById('compName').value || '[COMPANY NAME]',
                compAdd1: document.getElementById('compAdd1').value,
                compAdd2: document.getElementById('compAdd2').value,
                compCity: document.getElementById('compCity').value,
                compState: document.getElementById('compState').value,
                compZip: document.getElementById('compZip').value,
                compContact: document.getElementById('compContact').value || '[PHONE/EMAIL]',
                compEIN: document.getElementById('compEIN').value || 'XX-XXXXXXX',
                
                empName: document.getElementById('empName').value || '[EMPLOYEE NAME]',
                empAdd1: document.getElementById('empAdd1').value,
                empAdd2: document.getElementById('empAdd2').value,
                empCity: document.getElementById('empCity').value,
                empState: document.getElementById('empState').value,
                empZip: document.getElementById('empZip').value,
                empSSN: document.getElementById('empSSN').value || 'XXX-XX-XXXX',

                bankName: document.getElementById('bankName').value || '[BANK NAME]',
                acctNum: document.getElementById('acctNum').value || 'XXXX'
            };

            // Format Address Blocks (City, State, Zip on one line)
            data.compAddressBlock = buildAddressBlock(data.compAdd1, data.compAdd2, data.compCity, data.compState, data.compZip);
            data.empAddressBlock = buildAddressBlock(data.empAdd1, data.empAdd2, data.empCity, data.empState, data.empZip);

            let htmlString = '';

            if (docType === 'w2') {
                const taxes = calculateTaxes(targetAmt, incType, true, data.compState);
                htmlString += renderW2(data, taxes);
                htmlString += renderW2(data, taxes); 
            } else {
                const taxes = calculateTaxes(targetAmt, incType, false, data.compState);
                const count = parseInt(document.getElementById('stubCount').value) || 1;
                for (let i = 1; i <= count; i++) {
                    htmlString += renderPaystub(data, taxes, i, count);
                }
            }

            output.innerHTML = htmlString;
        }

        function downloadPDF() {
            const element = document.getElementById('documentOutput');
            const docType = document.getElementById('docType').value;
            
            const opt = {
                margin:       [0.5, 0.5, 0.5, 0.5],
                filename:     `SpoofPayer_${docType.toUpperCase()}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save();
        }

        window.onload = function() {
            populateStates();
            document.getElementById('startDate').valueAsDate = new Date();
            updatePreview();
        };
    </script>
</body>
</html>
